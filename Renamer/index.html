<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PDF Renamer</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗃️</text></svg>" type="image/svg+xml">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.3/dist/tesseract.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
<h1>PDF Renamer</h1>

<div class="horizontal-form">
  <div class="form-group">
    <label> Date:</label>
    <input type="text" id="date" placeholder="e.g., 2025.11.11">
    <label class="toggle-label"><input type="checkbox" id="enableDate" checked> (toggle)</label>
  </div>
  <div class="form-group">
    <label> File Name:</label>
    <input type="text" id="fileNameExt" placeholder="e.g., DTR">
    <label class="toggle-label"><input type="checkbox" id="enableFileNameExt" checked> (toggle)</label>
  </div>
  <div class="form-group">
    <label> Attachment:</label>
    <input type="text" id="attachment" placeholder="e.g., Attachment_1">
    <div class="attachment-buttons">
      <button type="button" onclick="selectAttachment()" title="Select attachment field">Select</button>
      <button type="button" onclick="clearAttachment()" title="Clear attachment field">Clear</button>
    </div>
    <label class="toggle-label"><input type="checkbox" id="enableAttachment" checked> (toggle)</label>
  </div>
</div>

<div class="sort-options">
  <label for="sortSelect">Sort files by: </label>
  <select id="sortSelect">
    <option value="none">None</option>
    <option value="name">Name</option>
    <option value="size">Size</option>
    <option value="date">Upload Date</option>
  </select>
</div>

<div class="file-group">
  <button class="button" id="uploadFolderBtn" aria-label="Upload PDF folder">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
    </svg>
    Upload PDF Folder
  </button>
  <button class="button" id="selectAllBtn" aria-label="Select all files">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
    </svg>
    Select All <span class="shortcut-hint">(Ctrl+Q)</span>
  </button>
  <button class="button" id="deselectAllBtn" aria-label="Deselect all files">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
    </svg>
    Deselect All <span class="shortcut-hint">(Ctrl+D)</span>
  </button>
  <button class="button" id="clearAllBtn" aria-label="Clear all files">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
    </svg>
    Clear All
  </button>
  <button class="button" id="renameBtn" aria-label="Rename and download PDFs">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
    </svg>
    Rename & Download ZIP <span class="shortcut-hint">(Ctrl+R)</span>
  </button>
</div>

<div id="fileCounter">No files loaded</div>

<!-- CHANGED: Removed accept attribute to fix upload issue -->
<input type="file" id="pdfFiles" webkitdirectory multiple style="display:none;">

<div id="uploadConfirmModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Confirm Folder Upload</div>
    <div id="selectedFolderText"></div>
    <div class="modal-footer">
      <button class="button" id="confirmUpload" style="background:#007bff;color:white;">Upload</button>
      <button class="button" id="cancelUpload" style="background:#f44336;color:white;">Cancel</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="fileList" class="file-list"></div>
  <iframe id="pdfViewer"></iframe>
</div>

<div id="renameModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Edit PDF File Names</div>
    <div id="modalFileList"></div>
    <div class="modal-footer">
      <button class="button" id="confirmDownload" style="background:#007bff;color:white;">Confirm & Download</button>
      <button class="button" id="cancelModal" style="background:#f44336;color:white;">Cancel</button>
    </div>
  </div>
</div>

<div id="loadingIndicator">
  Generating ZIP: <span id="progressText">0%</span>
  <div id="progressBarContainer"><div id="progressBar"></div></div>
</div>

<div id="selectedCount" class="selected-count" style="display: none;">0 selected</div>

<script src="script.js"></script>
</body>
