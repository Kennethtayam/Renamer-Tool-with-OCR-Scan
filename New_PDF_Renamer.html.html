<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Renamer</title>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.3/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial, sans-serif; padding: 20px; }
h2 { text-align: center; margin-bottom: 30px; font-size: 40px; }
.horizontal-form { display: flex; gap: 20px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
.form-group { display: flex; align-items: center; gap: 6px; }
.form-group label { font-size: 16px; }
.form-group input[type="text"] { padding: 5px 8px; font-size: 16px; border: 2px solid #777; border-radius: 5px; }
.toggle-label { font-size: 14px; color: #555; display: flex; align-items: center; gap: 4px; }

.file-group { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; gap: 10px; }
.button { padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; border: none; }
#selectAllBtn { background: #4caf50; color: white; }
#deselectAllBtn { background: #f44336; color: white; }

.container { display: flex; gap: 20px; }
.file-list { flex: 1; max-width: 500px; border: 1px solid #ccc; padding: 10px; height: 78vh; overflow-y: auto; }
.file-item { display: flex; flex-direction: column; padding: 12px; background-color: #f2f6ff; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); transition: 0.2s; }
.file-item.selected { border: 2px solid #007bff; background-color: #e6f0ff; }
.file-item:hover { background-color: #e8f0ff; }

.file-item .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.pdf-icon { font-size: 20px; margin-right: 10px; }

.file-item input[type="text"] { width: 90%; padding: 12px; font-size: 16px; border: 2px solid #777; border-radius: 6px; outline: none; }
.file-item input[type="text"]:focus { border-color: #777; box-shadow: none; }
.file-item input[type="text"]:hover { border-color: #777; }

#pdfViewer { flex: 2; width: 100%; height: 80vh; border: 1px solid #ccc; }
.button-wrapper { text-align: center; margin-top: 20px; }
.modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); }
.modal-content { background-color: #fff; margin: 50px auto; padding: 20px; border-radius: 10px; max-width: 800px; max-height: 80vh; overflow-y: auto; }
.modal-header { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
.modal-footer { text-align: right; margin-top: 10px; }
.modal input[type="text"] { width: 85%; padding: 8px; margin-bottom: 10px; font-size: 16px; border: 2px solid #777; border-radius: 6px; }
.remove-btn { padding: 6px 10px; margin-left: 8px; background: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }

#loadingIndicator { display:none; position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); color:white; padding:10px 15px; border-radius:8px; font-weight:bold; z-index:10000; width:220px; }
#progressBarContainer { width: 100%; background-color: #555; border-radius: 5px; margin-top: 5px; height: 10px; }
#progressBar { height: 100%; width: 0%; background-color: #4caf50; border-radius: 5px; transition: width 0.2s ease; }
</style>
</head>
<body>

<h2>PDF Renamer</h2>

<div class="horizontal-form">
  <div class="form-group">
    <label> Date:</label>
    <input type="text" id="date" placeholder="e.g., 2025.11.11">
    <label class="toggle-label"><input type="checkbox" id="enableDate" checked> (toggle)</label>
  </div>
  <div class="form-group">
    <label> File Name:</label>
    <input type="text" id="fileNameExt" placeholder="e.g., DTR">
    <label class="toggle-label"><input type="checkbox" id="enableFileNameExt" checked> (toggle)</label>
  </div>
  <div class="form-group">
    <label> Attachment:</label>
    <input type="text" id="attachment" placeholder="e.g., Attachment_1">
    <label class="toggle-label"><input type="checkbox" id="enableAttachment" checked> (toggle)</label>
  </div>
</div>

<div class="file-group">
  <button class="button" id="uploadFolderBtn">Upload PDF Folder</button>
  <button class="button" id="selectAllBtn">Select All</button>
  <button class="button" id="deselectAllBtn">Deselect All</button>
</div>

<input type="file" id="pdfFiles" webkitdirectory multiple accept="application/pdf" style="display:none;">

<div id="uploadConfirmModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Confirm Folder Upload</div>
    <div id="selectedFolderText"></div>
    <div class="modal-footer">
      <button class="button" id="confirmUpload" style="background:#007bff;color:white;">Upload</button>
      <button class="button" id="cancelUpload" style="background:#f44336;color:white;">Cancel</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="fileList" class="file-list"></div>
  <iframe id="pdfViewer"></iframe>
</div>

<div class="button-wrapper">
  <button class="button" id="renameBtn">Rename & Download PDFs (ZIP)</button>
</div>

<div id="renameModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Edit PDF File Names</div>
    <div id="modalFileList"></div>
    <div class="modal-footer">
      <button class="button" id="confirmDownload" style="background:#007bff;color:white;">Confirm & Download</button>
      <button class="button" id="cancelModal" style="background:#f44336;color:white;">Cancel</button>
    </div>
  </div>
</div>

<div id="loadingIndicator">
  Generating ZIP: <span id="progressText">0%</span>
  <div id="progressBarContainer"><div id="progressBar"></div></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.worker.min.js';

let filesArray = [];
let tempFilesArray = [];

// Enable/disable top inputs
document.getElementById('enableDate').addEventListener('change', e => { document.getElementById('date').disabled = !e.target.checked; });
document.getElementById('enableFileNameExt').addEventListener('change', e => { document.getElementById('fileNameExt').disabled = !e.target.checked; });
document.getElementById('enableAttachment').addEventListener('change', e => { document.getElementById('attachment').disabled = !e.target.checked; });

function titleCasePreserveInitials(str) {
  if (!str) return '';
  const parts = str.split(/\s+/).filter(Boolean);
  const resParts = parts.map(p => {
    const clean = p.replace(/[.,]/g,'');
    if (clean.length === 1 && /^[A-Z]$/i.test(clean)) return clean.toUpperCase() + '.';
    return clean.charAt(0).toUpperCase() + clean.slice(1).toLowerCase();
  });
  return resParts.join(' ');
}

function normalizeSuffix(word) {
  const w = word.replace(/\./g,'').toUpperCase();
  if (w==='JR') return 'Jr.';
  if (w==='SR') return 'Sr.';
  if (/^I{2,4}$/.test(w)) return w;
  return null;
}

async function extractRegionCanvas(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext("2d"), viewport: viewport }).promise;

  const cropY = Math.round(viewport.height * 0.09);
  const cropHeight = Math.round(viewport.height * 0.23);
  const croppedCanvas = document.createElement("canvas");
  croppedCanvas.width = viewport.width;
  croppedCanvas.height = cropHeight;
  const ctx = croppedCanvas.getContext("2d");
  ctx.drawImage(canvas, 0, cropY, viewport.width, cropHeight, 0, 0, viewport.width, cropHeight);
  return croppedCanvas;
}

async function getOCRName(canvas) {
  const { data: { text } } = await Tesseract.recognize(canvas, 'eng', { logger: m => {} });
  if (!text) return '';
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const candidateLines = [];
  for (const raw of lines) {
    const cleaned = raw.replace(/[^A-Z0-9,\.\s]/ig,' ').replace(/\s+/g,' ').trim();
    if (!cleaned) continue;
    const letters = cleaned.replace(/[^A-Z]/gi,'');
    if (letters.length<2) continue;
    candidateLines.push(cleaned);
  }
  if (candidateLines.length===0) return text.replace(/\s+/g,' ').trim();

  let lastNameLine = null;
  let firstMidLine = null;
  for (let i=0;i<candidateLines.length;i++){
    const ln=candidateLines[i];
    const words = ln.split(/\s+/);
    const noise = ['DAILY','TIME','RECORD','OCTOBER','CIVIL','SERVICE','FORM','TOTAL','ARRIVAL','DEPARTURE','VERIFIED','SIGNED'];
    const up = ln.toUpperCase();
    if (noise.some(n=>up.includes(n))) continue;

    if (ln.includes(',') && ln.split(',').length>=2){
      const parts = ln.split(',').map(p=>p.trim()).filter(Boolean);
      if (parts.length>=2){ lastNameLine=parts[0]; firstMidLine=parts.slice(1).join(' '); break; }
    }

    const letterOnly = ln.replace(/[^\w\s\.]/g,'').trim();
    if (words.length<=3 && /[A-Z]/.test(letterOnly)){
      if (i+1 < candidateLines.length){
        const next=candidateLines[i+1];
        const nextWords = next.split(/\s+/);
        if (nextWords.length>=1){ lastNameLine=ln; firstMidLine=next; break; }
      } else { lastNameLine=ln; }
    }
  }

  if (!lastNameLine && candidateLines.length>=1){ lastNameLine=candidateLines[0]; if(candidateLines.length>=2) firstMidLine=candidateLines[1]; }

  if (!lastNameLine) return '';
  const cleanLast = lastNameLine.replace(/[^A-Z0-9\s\-]/ig,' ').replace(/\s+/g,' ').trim();
  const cleanFirstRaw = firstMidLine ? firstMidLine.replace(/[^A-Z0-9\s\.\-]/ig,' ').replace(/\s+/g,' ').trim() : '';

  let suffix = null;
  let firstMidNoSuffix = cleanFirstRaw;
  if (cleanFirstRaw){
    const parts = cleanFirstRaw.split(/\s+/);
    const lastToken = parts[parts.length-1].replace(/\./g,'').toUpperCase();
    const normalized = normalizeSuffix(lastToken);
    if (normalized){ suffix=normalized; parts.pop(); firstMidNoSuffix=parts.join(' '); }
  }

  const lastTitle = titleCasePreserveInitials(cleanLast);
  const firstMidTitle = titleCasePreserveInitials(firstMidNoSuffix);

  // ✅ Combine: Lastname + comma + space + FirstMid + (space + suffix)
  let combined = lastTitle;
  if(firstMidTitle) combined += ', ' + firstMidTitle;
  if(suffix) combined += ' ' + suffix;
  combined = combined.replace(/\s+/g,' ').trim();
  return combined;
}

/* --- Folder Upload Logic --- */
const uploadBtn = document.getElementById('uploadFolderBtn');
const pdfFilesInput = document.getElementById('pdfFiles');
const uploadModal = document.getElementById('uploadConfirmModal');
const selectedFolderText = document.getElementById('selectedFolderText');
const confirmUpload = document.getElementById('confirmUpload');
const cancelUpload = document.getElementById('cancelUpload');

uploadBtn.addEventListener('click', () => { pdfFilesInput.click(); });
pdfFilesInput.addEventListener('change', e => {
  tempFilesArray = Array.from(e.target.files).filter(f=>f.type==="application/pdf");
  if(tempFilesArray.length===0) return;
  const folderPath=tempFilesArray[0].webkitRelativePath.split('/')[0];
  selectedFolderText.textContent=`Selected folder: ${folderPath} — ${tempFilesArray.length} PDF(s)`;
  uploadModal.style.display="block";
});

confirmUpload.addEventListener('click', async () => {
  uploadModal.style.display="none";
  filesArray=tempFilesArray;
  const fileListDiv=document.getElementById('fileList');
  fileListDiv.innerHTML="";
  for(let index=0; index<filesArray.length; index++){
    const file=filesArray[index];
    const div=document.createElement('div');
    div.className="file-item";
    div.innerHTML=`
      <div class="top-row">
        <span class="pdf-icon">File Name:</span>
        <label><input type="checkbox" class="enableName" data-index="${index}" checked> Enable editing</label>
      </div>
      <input type="text" id="newName${index}" placeholder="OCR reading...">
    `;
    fileListDiv.appendChild(div);
    const checkbox=div.querySelector('.enableName');
    const input=div.querySelector(`#newName${index}`);
    checkbox.addEventListener('change',()=>{ input.disabled=!checkbox.checked; });
    div.addEventListener('click',()=>{
      document.getElementById('pdfViewer').src=URL.createObjectURL(file);
      document.querySelectorAll('.file-item').forEach(item=>item.classList.remove('selected'));
      div.classList.add('selected');
    });
    try{
      const canvas=await extractRegionCanvas(file);
      const ocrName=await getOCRName(canvas);
      input.value=ocrName||file.name.replace('.pdf','');
    }catch(err){
      console.error('OCR error for file',file.name,err);
      input.value=file.name.replace('.pdf','');
    }
  }
});

cancelUpload.addEventListener('click',()=>{ uploadModal.style.display="none"; pdfFilesInput.value=""; });
window.addEventListener('click', e=>{ if(e.target===uploadModal) uploadModal.style.display="none"; });

/* ---- Select/Deselect All ---- */
document.getElementById('selectAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.enableName').forEach(cb => { cb.checked=true; document.getElementById(`newName${cb.dataset.index}`).disabled=false; });
});
document.getElementById('deselectAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.enableName').forEach(cb => { cb.checked=false; document.getElementById(`newName${cb.dataset.index}`).disabled=true; });
});

/* ---- Rename & Download Modal Logic ---- */
document.getElementById('renameBtn').addEventListener('click', ()=>{
  if(filesArray.length===0){ alert("Please select PDF files!"); return; }
  const modal=document.getElementById('renameModal');
  const modalList=document.getElementById('modalFileList');
  modalList.innerHTML="";
  const dateVal=document.getElementById('date').disabled?"":document.getElementById('date').value.trim();
  const fileExtVal=document.getElementById('fileNameExt').disabled?"":document.getElementById('fileNameExt').value.trim();
  const attachmentVal=document.getElementById('attachment').disabled?"":document.getElementById('attachment').value.trim();
  filesArray.forEach((file,index)=>{
    const mainName=document.getElementById(`newName${index}`).value.trim()||file.name.replace(".pdf","");
    const newFileName=[mainName,dateVal,fileExtVal,attachmentVal].filter(Boolean).join("_")+".pdf";
    const div=document.createElement('div');
    div.id=`modalItem${index}`;
    div.style.display="flex";
    div.style.alignItems="center";
    div.style.marginBottom="8px";
    div.innerHTML=`<input type="text" id="modalName${index}" value="${newFileName}"><button class="remove-btn" data-index="${index}">❌ Remove</button>`;
    modalList.appendChild(div);
    div.querySelector('.remove-btn').addEventListener('click', e=>{
      const idx=parseInt(e.target.dataset.index);
      filesArray.splice(idx,1);
      div.remove();
      const mainDiv=document.getElementById(`newName${idx}`).parentNode;
      mainDiv.remove();
      document.querySelectorAll('.remove-btn').forEach((btn,i)=>btn.dataset.index=i);
      document.querySelectorAll('#modalFileList input[type="text"]').forEach((inp,i)=>inp.id=`modalName${i}`);
    });
  });
  modal.style.display="block";
});

document.getElementById('cancelModal').addEventListener('click', ()=>{ document.getElementById('renameModal').style.display="none"; });

document.getElementById('confirmDownload').addEventListener('click', async ()=>{
  const zip=new JSZip();
  const loading=document.getElementById('loadingIndicator');
  const progressBar=document.getElementById('progressBar');
  const progressText=document.getElementById('progressText');
  loading.style.display="block";
  for(let i=0;i<filesArray.length;i++){
    const file=filesArray[i];
    const nameInput=document.getElementById(`modalName${i}`);
    const newFileName=nameInput.value.trim()||file.name;
    const fileData=await file.arrayBuffer();
    zip.file(newFileName,fileData);
    const progressPercent=Math.round(((i+1)/filesArray.length)*100);
    progressBar.style.width=progressPercent+"%";
    progressText.textContent=progressPercent+"%";
  }
  zip.generateAsync({type:"blob"}).then(content=>{
    saveAs(content,"Renamed_PDFs.zip");
    alert("✔ All PDFs saved in ZIP successfully!");
    document.getElementById('renameModal').style.display="none";
    loading.style.display="none";
    progressBar.style.width="0%";
    progressText.textContent="0%";
  });
});

window.addEventListener('click', e=>{ const modal=document.getElementById('renameModal'); if(e.target===modal) modal.style.display="none"; });
</script>
</body>
</html>
